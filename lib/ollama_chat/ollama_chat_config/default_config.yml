---
proxy: null # http://localhost:8080
model:
  name: <%= OC::OLLAMA::CHAT::MODEL %>
  options:
    num_ctx: 8192
timeouts:
  connect_timeout: null
  read_timeout: 300
  write_timeout: 300
languages:
  - en-US
location:
  enabled: true
  name: Berlin
  decimal_degrees: [ 52.514127, 13.475211 ]
  units: SI (International System of Units) # or USCS (United States Customary System)
runtime_info:
  enabled: true
prompts:
  embed: "This source was now embedded: %{source}"
  summarize: |
    Generate an abstract summary of the content in this document using
    %{words} words:

    %{source_content}
  web_embed: |
    Answer the the query %{query} using the provided chunks.
  web_import: |
    Answer the the query %{query} using these imported sources:

    %{results}
  web_summarize: |
    Answer the the query %{query} using these summarized sources:

    %{results}
  location: You are at %{location_name}, %{location_decimal_degrees}, preferring %{units}
  runtime_info: |
    There is usually no reason to mention this information to the user unless
    asked about it.

    - Name of the chat user: %{user}
    - Languages the user prefers: %{languages}
    - Current time is %{time}
    - Location: %{location}
    - Current directory is "%{current_directory}"
    - **Git**:
      - Current branch is %{git_current_branch}
      - Current remote origin is %{git_remote_origin}
    - Client is %{client}.
    - **Terminal**:
      - The height is %{terminal_rows} rows.
      - The width is %{terminal_cols} columns. **Always** aim to stay within
        80%% of this width in your output of responses, especially when using
        markdown tables.
    - Markdown output is %{markdown}. **Never** output markdown as your
      responses if it is disabled.
    - Voice output is %{voice}. Speak naturally and short if voice
      output is enabled.
    - These tools have access to these allowed paths: %{tool_paths_allowed}
  help: |
    Wait for the user to ask questions about the usage of chat commands. Just
    list the command names separated by spaces (no descriptions yet) and
    offer to answer any questions about any of them. Interactively help the
    user by answering questions about the following
    chat commands:

    %{commands}
  persona: |
    # Persona

    ## Character Profile

    - **Name**: [Their name]
    - **Occupation**: [Their job/career]
    - **Gender**: [Their gender]

    ## Personality and Behavior

    - **Core Values**: [Their values]
    - **Personality Traits**: [Key personality characteristics]
    - **Emotional Style**: [How they express emotions]
    - **Behavioral Patterns**: [Typical behaviors and habits]

    ## Core Guidelines

    - **Role definition**: [What is your primary role/identity?]
    - **Tone**: [Describe your speaking style - formal, casual, technical, etc.]
    - **Language**: [Natural language and any constraints]
    - **Guideline 1**: [e.g., "Maintain consistency with character"]
    - **Guideline 2**: [e.g., "Use appropriate communication style"]
    - **Guideline 3**: [e.g., "Stay in character"]
    - **Guideline 4**: [e.g., "Never mention being an AI"]

    ## Communication Style

    - **Format**: [Markdown, plain text, code blocks, etc.]
    - **Vocabulary**: [Technical terms, slang, formal language]
    - **Structure**: [How you organize your responses]
system_prompts:
  default: <%= OC::OLLAMA::CHAT::SYSTEM || 'null' %>
  assistant: You are a helpful assistant.
voice:
  enabled: false
  default: Samantha
  list: <%= defined?(RSpec) ? '[]' : `say -v '?' 2>/dev/null`.lines.map { |l| l.force_encoding('ASCII-8BIT'); l[/^(.+?)\s+[a-z]{2}_[a-zA-Z0-9]{2,}/, 1] }.uniq.sort.to_s %>
markdown: true
stream: true
document_policy: importing
think:
  mode: disabled
  loud: true
context:
  format: JSON
embedding:
  enabled: true
  paused: false
  model:
    name: mxbai-embed-large
    embedding_length: 1024
    context_length: 1024
    options: {}
    # Retrieval prompt template:
    prompt: 'Represent this sentence for searching relevant passages: %s'
  batch_size: 10
  database_filename: null # ':memory:'
  collection: <%= OC::OLLAMA::CHAT::COLLECTION %>
  found_texts_size: 4096
  found_texts_count: 10
  splitter:
    name: RecursiveCharacter
    chunk_size: 1024
cache: Documentrix::Documents::SQLiteCache
redis:
  documents:
    url: <%= OC::OLLAMA::REDIS_URL %>
  expiring:
    url: <%= OC::OLLAMA::REDIS_EXPIRING_URL %>
    ex: 86400
working_dir_dependent_socket: true
request_headers:
  Accept: 'text/*,application/*,image/*'
ssl_no_verify: []
paste: pfc # Paste clipboard content to chat app
copy: ctc # Copy stdin to clipboard app
web_search:
  use: duckduckgo
  engines:
    duckduckgo:
      url: 'https://www.duckduckgo.com/html/?q=%{query}'
    searxng:
      url: <%= OC::OLLAMA::SEARXNG_URL %>
vim:
  clientserver: socket
tools:
  enabled: true
  functions:
    get_current_weather:
      result_display_timeout: 3
      url: "https://api.pirateweather.net/forecast/KeyInHeader/%{lat},%{lon}?units=%{units}"
      default: false
    get_cve:
      result_display_timeout: 3
      url: 'https://cveawg.mitre.org/api/cve/%{cve_id}'
      default: true
    get_endoflife:
      result_display_timeout: 3
      url: "https://endoflife.date/api/v1/products/%{product}"
      default: false
    get_time:
      result_display_timeout: 3
      default: true
    get_location:
      result_display_timeout: 3
      default: true
    file_context:
      default: false
      require_confirmation: false
      result_display_timeout: 3
      allowed:
        - './spec'
    directory_structure:
      default: true
      require_confirmation: false
      result_display_timeout: 3
      exclude:
        - corpus
        - pkg
    execute_grep:
      default: true
      result_display_timeout: 3
      cmd: |
        grep #{'-i' if ignore_case} -m #{max_results} -r #{before.full? { "-B %u " % it }}#{after.full? { "-A %u " % it }}#{context.full? { "-C %u " % it }}#{pattern} #{path}
    browse:
      result_display_timeout: 3
      default: true
    write_file:
      default: true
      require_confirmation: true
      allowed:
        - './tmp'
    read_file:
      default: true
      require_confirmation: false
      result_display_timeout: 3
      allowed:
        - './tmp'
        - './lib'
        - './spec'
    search_web:
      default: true
      require_confirmation: true
      result_display_timeout: 3
      max_results: 25
    get_url:
      default: true
      require_confirmation: true
      result_display_timeout: 3
      schemes:
        - http
        - https
    gem_path_lookup:
      result_display_timeout: 3
      default: true
    open_file_in_editor:
      default: true
      require_confirmation: true
      result_display_timeout: 0
    run_tests:
      require_confirmation: true
      result_display_timeout: 3
      default: true
      allowed:
        - "./spec"
        - "./test"
        - "./tests"
    get_jira_issue:
      result_display_timeout: 3
      default: false
    get_rfc:
      url: "https://www.rfc-editor.org/rfc/rfc%{rfc_id}.txt"
      result_display_timeout: 3
      default: true
    generate_password:
      default: true
    copy_to_clipboard:
      result_display_timeout: 3
      default: true
    paste_from_clipboard:
      result_display_timeout: 3
      default: true
    paste_into_editor:
      result_display_timeout: 3
      require_confirmation: true
      default: true
    execute_ri:
      result_display_timeout: 3
      default: true
    resolve_tag:
      result_display_timeout: 3
      default: true
    patch_file:
      default: true
      require_confirmation: true
      allowed:
        - './tmp'
