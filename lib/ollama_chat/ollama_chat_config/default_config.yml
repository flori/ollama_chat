---
proxy: null # http://localhost:8080
model:
  name: <%= OC::OLLAMA::CHAT::MODEL %>
  options:
    num_ctx: 8192
timeouts:
  connect_timeout: null
  read_timeout: 600
  write_timeout: 600
languages:
  - en-US
location:
  enabled: true
  name: Berlin
  decimal_degrees: [ 52.514127, 13.475211 ]
  units: SI (International System of Units) # or USCS (United States Customary System)
runtime_info:
  enabled: true
infobar:
  message:
    :format: '%l %c/%t in %te %r ETA %e @%E %s'
    '%s':
      :frames: :braille181
      :message: ✓
prompts:
  prompt:
    embed: The source %{source} has been added to or updated in collection "%{collection}".
    rerank: |
      Query: %{query}
      Candidates:

        %{candidates}

      Return only the indices of the most relevant snippets as a comma-separated
      list (e.g., '0,2').
    summarize: |
      Generate an abstract summary of the content in this document using
      %{words} words:

      %{source_content}
    web_embed: |
      Answer the the query %{query} using the provided chunks.
    web_import: |
      Answer the the query %{query} using these imported sources:

      %{results}
    web_summarize: |
      Answer the the query %{query} using these summarized sources:

      %{results}
    location: You are at %{location_name}, %{location_decimal_degrees}, preferring %{units}
    static_runtime_info: |
      - Name of the chat user: %{user}
      - Languages the user prefers: %{languages}
      - Location: %{location}
      - Current directory is "%{current_directory}"
      - Client is %{client}.
      - These tools have access to these allowed paths: %{tool_paths_allowed}
      - Search in these collections with `retrieve_document_snippets`: %{collections}
    dynamic_runtime_info: |
      There is usually no reason to mention this information to the user unless
      asked about it.

      - Current time is %{weekday}, %{time}
      - **Git**:
        - Current branch is %{git_current_branch}
        - Current SHA is %{git_sha} (short %{git_sha_short})
        - Current remote origin is %{git_remote_origin}
      - **Terminal**:
        - The height is %{terminal_rows} rows.
        - The width is %{terminal_cols} columns. **Always** aim to stay within
          80%% of this width in your output of responses, especially when using
          markdown tables.
      - **Session**: %{session_name}
        - Markdown output is %{markdown}. **Never** output markdown as your
          responses if it is disabled.
        - Voice output is %{voice}. Speak naturally and short if voice
          output is enabled.
        - Tools Support is %{tools_support}. Inform the user about this, if he
          wants you to call a tool function.
    help: |
      Wait for the user to ask questions about the usage of chat commands. Just
      list the command names separated by spaces (no descriptions yet) and
      offer to answer any questions about any of them. Interactively help the
      user by answering questions about the following
      chat commands:

      %{commands}
    persona_architect: |
      You are an expert Narrative Designer and Character Architect. Your sole
      task is to transform raw character data (JSON) into a high-fidelity
      Markdown persona profile.
      
      ### THE MANDATORY STRUCTURE:
      
      You MUST output the profile following this exact template, filling in the
      bracketed values with the provided data and expanding brief notes into
      evocative, descriptive prose:
     
      ```
      %{persona_template}
      ```
      
      ### Critical Constraints:
      
      - **NO PREAMBLE**: Do not say 'Sure, here is the profile' or 'Based on the
        data provided'.
      - **NO POSTAMBLE**: Do not add notes, suggestions, or closing remarks.
      - **OUTPUT ONLY MARKDOWN**: Your response must contain nothing but the
        final Markdown content.
      - **FIDELITY**: Do not invent new biographical facts, but feel free to
         polish the phrasing to make it more descriptive and atmospheric.

      ### Character data

      ```
      %{character}
      ```
    persona: |
      # Persona

      ## Character Profile

      - **Name**: [Their name]
      - **Occupation**: [Their job/career]
      - **Gender**: [Their gender]

      ## Personality and Behavior

      - **Core Values**: [Their values]
      - **Personality Traits**: [Key personality characteristics]
      - **Emotional Style**: [How they express emotions]
      - **Behavioral Patterns**: [Typical behaviors and habits]

      ## Core Guidelines

      - **Role definition**: [What is your primary role/identity?]
      - **Tone**: [Describe your speaking style - formal, casual, technical, etc.]
      - **Perspective**: [3rd person narrative, 1st person dialogue]
      - **Language**: [Natural language and any constraints]
      - **Guideline 1**: [e.g., "Maintain consistency with character"]
      - **Guideline 2**: [e.g., "Use appropriate communication style"]
      - **Guideline 3**: [e.g., "Stay in character"]
      - **Guideline 4**: [e.g., "Never mention being an AI"]

      ## Communication Style

      - **Format**: [Markdown, plain text, code blocks, etc.]
      - **Vocabulary**: [Technical terms, slang, formal language]
      - **Structure**: [How you organize your responses]
    session_summarize: |
      Context is

      %{context}

      Summarize the %{sender_name} message below in one %{unit}.

      NEVER add any information to this message summary that already was included
      in the context above.

      Message

      Thinking content was

      %{message_thinking}

      Response content was

      %{message_content}
    session_title: |
      Create a title with a length of **less than %{length}** characters for this
      conversation. Output only the title and nothing else:

      %{content}
  suggest:
    coding: |
      ## Context

      You are acting as a Senior Software Architect and Technical Auditor. Your goal
      is to analyze the conversation history between a developer and an AI to
      identify technical blind spots, architectural risks, and optimization
      opportunities. You do not just summarize; you challenge the current
      implementation to ensure it is production-ready, scalable, and maintainable.

      ## Task

      Analyze the provided Conversation History. Generate exactly 8 distinct, concise
      follow-up prompts that the user could ask next to further their goal from a
      professional engineering perspective.

      Each prompt must map strictly to one of these categories:

      1. **Technical Deep-Dive**: A tactical inquiry into the immediate
         implementation details or logic flow.
      2. **Edge Case/Optimization**: A stress test identifying where the logic
         breaks, fails silently, or degrades in performance.
      3. **Complexity & Scale**: An analysis of Big O, memory pressure, or
         concurrency (e.g., "How does this behave under 100x load?").
      4. **Maintainability & Debt**: An evaluation of clean code principles and
         whether the current approach introduces future technical debt.
      5. **Alternative Trade-offs**: A "Plan B" challenge suggesting a different
         design pattern, library, or architectural approach.
      6. **Verification & Testing**: A request for a programmatic verification
         strategy (e.g., boundary value analysis or mocking dependencies).
      7. **Knowledge Transfer & Documentation**: An inquiry about updating API
         contracts, READMEs, or creating an Architectural Decision Record (ADR).
      8. **Strategic Next Step**: A high-level roadmap question connecting this
         tactical win to the broader system architecture.

      ## Constraints

      - **Quantity**: Exactly 8 suggestions.
      - **Tone**: Rigorous, auditing, and senior. Avoid passive phrasing ("Maybe you
        could...") in favor of critical analysis ("This approach risks X; how do we
        resolve it?").
      - **Negative Constraints**: 
          - DO NOT use numbering or bullet points.
          - DO NOT include introductory or concluding text.
          - DO NOT suggest generic, superficial questions (e.g., "How does this
            work?").
      - **Conciseness**: Each prompt must be a single, punchy sentence.

      ## Few-Shot Examples

      **Input:** [User and AI just implemented a Ruby method to parse a large JSON
      file into a database]

      **Output:**

      Can we refactor the parser to use a stream-based approach instead of loading
      the entire JSON into memory?

      How does this implementation handle malformed JSON or missing keys in the
      middle of a 2GB file without crashing the process?


      What is the time complexity of the current insert logic, and can we implement
      bulk inserts to reduce database round trips?

      Does the current naming convention for these helper methods align with our
      project's style guide, or are we introducing cognitive load for future
      maintainers?

      Would using a dedicated library like Oj provide significant performance gains
      over the standard JSON implementation here?

      What specific boundary cases should be covered in the RSpec suite to ensure the
      parser doesn't truncate data on trailing whitespace?

      Which sections of the API documentation need to be updated to reflect this
      change in the data ingestion pipeline?

      Now that parsing is solved, how does this integrate into our overall background
      job queue and retry logic?

      ## Output Format

      Output only the 8 suggestions as plain text, each separated by one empty line.
      No other characters or formatting.
    roleplaying: |
      ## Context
      
      You are an expert Narrative Consultant and Game Master's Assistant. Your
      purpose is to analyze a roleplay conversation history and provide high-value,
      diverse action prompts that help a player overcome writer's block while
      deepening the story.
      
      ## Task
      
      Analyze the provided Conversation History and current narrative state. Generate
      exactly 9 distinct, concise prompt suggestions that the user could use as their
      character's next response.
      
      Each suggestion must map to one of these specific categories:
      
      1. Plot Driver: A bold action or choice that advances the plot or increases
         tension.
      2. Emotional Core: An interaction focusing on emotional depth, social nuance,
         or psychological reaction.
      3. World Insight: Investigating an object or detail in the environment. Include
         a suggested dice roll (e.g., "Roll 1d20") if there is an inherent risk of
         failure or a need for high skill.
      4. Hidden Agenda: An action involving secrecy, deception, or private motives.
         Include a suggested dice roll (e.g., "Roll 1d20") if the action risks
         discovery.
      5. Social Catalyst: A prompt that engages all characters currently present in
         the scene to force group interaction.
      6. High Stakes: A risky gamble or sudden complication. This MUST explicitly
         include a suggested dice roll (e.g., "Roll 1d20").
      7. Character Quirk: A response rooted in the character's specific flaws,
         habits, or obsessions.
      8. Meta-Pivot: An abrupt shift in scene direction via a revelation, surprising
         admission, or sudden change of heart.
      9. The Curveball: An unexpected external event or realization that forces an
         immediate reaction.
      
      ## Constraints
      
      - Generate exactly 9 suggestions.
      - Each suggestion must be concise and punchy.
      - Negative Constraints: Do not use numbering, bullet points, or
        introductory/concluding text. Avoid generic clichés (e.g., "I can't believe
        this" or "What do we do now?").
      - Ensure the tone of the suggestions aligns with the established voice of the
        characters in the history.
      
      ## Variables
      
      - Conversation History: The provided log of messages between players and AI.
      
      ## Few-Shot Examples
      
      Input: [Scene where a party is arguing in a rainy forest while being hunted]
      Output:
      Demand that everyone stop shouting and listen for the sound of footsteps in the brush.
      
      Quietly admit to the party leader that you are terrified, leaning into their shoulder for support.
      
      Examine the muddy tracks near the campfire to see if the hunters are human or something else. Roll 1d20.
      
      Secretly slip the map out of the leader's pocket while they are distracted by the argument. Roll 1d20.
      
      Raise your voice and challenge every single person present to state their true loyalty right now.
      
      Attempt to leap across the ravine to flank the hunters, risking a fall into the rapids. Roll 1d20.
      
      Obsessively polish your sword with a rag, ignoring the argument entirely until it is perfectly mirrored.
      
      Suddenly reveal that you were actually sent here by the enemy as a double agent.
      
      A sudden lightning strike hits a nearby tree, knocking everyone off balance and creating a deafening blast.
      
      ## Output Format
      
      Output only the 9 suggestions as plain text, each separated by one empty line.
      No other text.
  system:
    default: <%= OC::OLLAMA::CHAT::SYSTEM || "%{persona}\n\n%{runtime_info}".inspect %>
    persona: |
      %{persona}

      %{runtime_info}
    assistant: You are a helpful assistant.
voice:
  enabled: false
  default: Samantha
  list: <%= defined?(RSpec) ? '[]' : `say -v '?' 2>/dev/null`.lines.map { |l| l.force_encoding('ASCII-8BIT'); l[/^(.+?)\s+[a-z]{2}_[a-zA-Z0-9]{2,}/, 1] }.uniq.sort.to_s %>
roles:
  user: 👨 %{sender_name}
  assistant: 🤖 %{sender_name}
  default: 👽 %{sender_name}
markdown: true
stream: true
document_policy: importing
think:
  mode: disabled
  loud: true
  strip: false
context:
  format: JSON
embedding:
  enabled: true
  paused: false
  model:
    name: snowflake-arctic-embed:137m
    embedding_length: 768
    context_length: 2048
    options: {}
    # Retrieval prompt template:
    prompt: 'Represent this sentence for searching relevant passages: %s'
  batch_size: 100
  database_filename: null # ':memory:'
  collection: <%= OC::OLLAMA::CHAT::COLLECTION %>
  collection_descriptions: {}
  found_texts_size: 16384
  found_texts_count: 10
  splitter:
    name: Semantic
    chunk_size: 512
    breakpoint: interquartile
    percentage: 50
    force: true
cache: Documentrix::Documents::SQLiteCache
redis:
  documents:
    url: <%= OC::OLLAMA::REDIS_URL %>
  expiring:
    url: <%= OC::OLLAMA::REDIS_EXPIRING_URL %>
    ex: 86400
working_dir_dependent_socket: true
request_headers:
  Accept: 'text/*,application/*,image/*'
ssl_no_verify: []
paste: pfc # Paste clipboard content to chat app
copy: ctc # Copy stdin to clipboard app
web_search:
  use: duckduckgo
  engines:
    duckduckgo:
      url: 'https://www.duckduckgo.com/html/?q=%{query}'
    searxng:
      url: <%= OC::OLLAMA::SEARXNG_URL %>
vim:
  clientserver: socket
tools:
  enabled: true
  functions:
    get_current_weather:
      result_display_timeout: 3
      url: "https://api.pirateweather.net/forecast/KeyInHeader/%{lat},%{lon}?units=%{units}"
      default: false
    get_cve:
      result_display_timeout: 3
      url: 'https://cveawg.mitre.org/api/cve/%{cve_id}'
      default: true
    get_endoflife:
      result_display_timeout: 3
      url: "https://endoflife.date/api/v1/products/%{product}"
      default: false
    get_time:
      result_display_timeout: 3
      default: true
    get_location:
      result_display_timeout: 3
      default: true
    file_context:
      default: false
      require_confirmation: false
      result_display_timeout: 3
      allowed:
        - './spec'
    directory_structure:
      default: true
      require_confirmation: false
      result_display_timeout: 3
      exclude:
        - corpus
        - pkg
    execute_grep:
      default: true
      result_display_timeout: 3
      cmd: |
        grep #{'-i' if ignore_case} -m #{max_results} -r #{before.full? { "-B %u " % it }}#{after.full? { "-A %u " % it }}#{context.full? { "-C %u " % it }}#{pattern} #{path}
    browse:
      result_display_timeout: 3
      default: true
    write_file:
      default: true
      require_confirmation: true
      allowed:
        - './tmp'
    delete_file:
      default: true
      require_confirmation: true
      allowed:
        - './tmp'
    move_file:
      default: true
      require_confirmation: true
      allowed:
        - './tmp'
    read_file:
      default: true
      require_confirmation: false
      result_display_timeout: 3
      allowed:
        - './tmp'
        - './lib'
        - './spec'
    search_web:
      default: true
      require_confirmation: true
      result_display_timeout: 3
      max_results: 25
    get_url:
      default: true
      require_confirmation: true
      result_display_timeout: 3
      schemes:
        - http
        - https
    gem_path_lookup:
      result_display_timeout: 3
      default: true
    open_file_in_editor:
      default: true
      require_confirmation: true
      result_display_timeout: 0
    run_tests:
      require_confirmation: true
      result_display_timeout: 3
      default: true
      allowed:
        - "./spec"
        - "./test"
        - "./tests"
    get_jira_issue:
      result_display_timeout: 3
      default: false
    get_rfc:
      url: "https://www.rfc-editor.org/rfc/rfc%{rfc_id}.txt"
      result_display_timeout: 3
      default: true
    generate_password:
      default: true
    copy_to_clipboard:
      result_display_timeout: 3
      default: true
    paste_from_clipboard:
      result_display_timeout: 3
      default: true
    paste_into_editor:
      result_display_timeout: 3
      require_confirmation: true
      default: true
    execute_ri:
      result_display_timeout: 3
      default: true
    resolve_tag:
      result_display_timeout: 3
      default: true
    patch_file:
      result_display_timeout: 3
      default: true
      allowed:
        - './tmp'
    retrieve_document_snippets:
      result_display_timeout: 3
      default: true
    compute_bmi:
      result_display_timeout: 3
      default: true
    generate_image:
      require_confirmation: true
      default: true
      timeout_attempts: 23
      timeout_duration: 66
    roll_dice:
      default: true
      reroll: false
      result_display_timeout: 10
    get_ghr:
      default: true
      result_display_timeout: 3
    eval_ruby:
      default: false
      result_display_timeout: 3
