dockerfile: |-
  RUN apt-get update && apt-get install -y --no-install-recommends \
    build-essential libyaml-dev libssl-dev git ghostscript

script: &script |-
  echo -e "\e[1m"
  ruby -v
  echo -e "\e[0m"
  bundle install --jobs=$(getconf _NPROCESSORS_ONLN)
  bundle exec rake spec

before: |-
  echo 🏁 Preparing…
  echo Deleting Gemfile.lock
  rm -f Gemfile.lock

after: |-
  if [[ "$RESULT" = "1" ]]
  then
    echo 😵 Some tests failed!
  else
    echo 🥳 All tests passed!
  fi
  echo Deleting Gemfile.lock
  rm -f Gemfile.lock

fail_fast: true

images:
  ruby:4.0-trixie: *script
  ruby:3.4-trixie: *script
  ruby:3.3-trixie: *script
  ruby:3.2-trixie: *script
